<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNDI Local Workspace</title>
    <!-- Google Material Icons -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-side: #ffffff;
            --primary: #1a73e8; 
            --primary-hover: #1557b0;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        .app-view { display: none; width: 100%; height: 100%; }
        .app-view.active { display: flex; }

        /* 1. 認証画面 */
        #authView {
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #eef2f7, #e0e7ff);
        }
        .auth-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .auth-logo { font-weight: bold; font-size: 28px; letter-spacing: 1px; margin-bottom: 8px; color: #0f172a; }
        .auth-subtitle { color: var(--text-sub); margin-bottom: 32px; font-size: 14px;}
        .auth-input-group { text-align: left; margin-bottom: 20px; }
        .auth-input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--text-sub); }
        .auth-input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 15px; outline: none; transition: border 0.2s; }
        .auth-input:focus { border-color: var(--primary); }
        .auth-btn { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .auth-btn:hover { background-color: var(--primary-hover); }
        .auth-toggle-link { margin-top: 20px; font-size: 14px; color: var(--primary); cursor: pointer; display: inline-block; }
        .auth-toggle-link:hover { text-decoration: underline; }

        /* 共通レイアウト */
        .sidebar { width: 260px; background-color: var(--bg-side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 16px; flex-shrink: 0; }
        .sidebar-logo { font-weight: bold; font-size: 22px; padding-left: 12px; margin-bottom: 32px; display: flex; align-items: center; gap: 8px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: var(--radius); cursor: pointer; color: var(--text-sub); font-weight: 500; margin-bottom: 4px; transition: all 0.2s; }
        .nav-item:hover, .nav-item.active { background-color: #f1f5f9; color: var(--primary); }
        .sidebar-spacer { flex-grow: 1; }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .top-bar { height: 64px; background-color: #ffffff; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; flex-shrink: 0; }
        .view-title { font-size: 18px; font-weight: 600; }
        .user-profile { display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 500;}
        .avatar { width: 32px; height: 32px; background: #e2e8f0; border-radius: 50%; display:flex; align-items:center; justify-content:center; font-weight:bold; color:var(--primary); text-transform: uppercase;}

        /* 2. ダッシュボード（はみ出しを完全修正） */
        .dashboard-body { padding: 32px; overflow-y: auto; flex-grow: 1; }
        .creator-row { display: flex; gap: 20px; margin-bottom: 40px; }
        
        /* 修正：文字がはみ出さないように幅とアイコンサイズを再設計 */
        .create-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; width: 150px; text-align: center; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow); }
        .create-card:hover { transform: translateY(-2px); border-color: var(--primary); }
        .create-card .card-icon { font-size: 32px; margin-bottom: 8px; display: block; }
        .create-card.doc .card-icon { color: #1a73e8; }
        .create-card.slide .card-icon { color: #f4b400; }
        .create-card span { display: block; font-size: 14px; font-weight: 600; color: var(--text-main); }

        .section-title { font-size: 14px; font-weight: 600; color: var(--text-sub); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px;}
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .file-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: border 0.2s; position: relative; }
        .file-card:hover { border-color: var(--primary); }
        .file-icon-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .file-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 24px; }
        .file-date { font-size: 12px; color: var(--text-sub); }
        .delete-btn { position: absolute; right: 12px; bottom: 12px; color: #ef4444; border: none; background: none; cursor: pointer; display: none; }
        .file-card:hover .delete-btn { display: block; }

        /* 3. ドキュメントエディタ */
        .editor-toolbar { height: 48px; background-color: #ffffff; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 8px; flex-shrink: 0; }
        .toolbar-btn { background: none; border: none; padding: 6px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; color: #475569; }
        .toolbar-btn:hover { background-color: #f1f5f9; color: var(--text-main); }
        .editor-container { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; background-color: #f1f5f9; }
        .document-paper { background: white; width: 100%; max-width: 800px; min-height: 1000px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 60px 80px; outline: none; font-size: 16px; line-height: 1.6; }

        /* 4. スライドエディタ ＆ テーマ選択追加 */
        .slide-workspace { flex-grow: 1; display: flex; background-color: #e2e8f0; overflow: hidden; }
        .slide-sidebar { width: 160px; background: white; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px 12px; gap: 12px; overflow-y: auto; flex-shrink: 0; }
        .slide-thumb { width: 100%; aspect-ratio: 16/9; background: #f8fafc; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text-sub); }
        .slide-thumb.active { border-color: var(--primary); background-color: #eff6ff; }
        
        /* 追加：テーマパネルのスタイル */
        .theme-sidebar { width: 180px; background: white; border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px 12px; gap: 10px; overflow-y: auto; flex-shrink: 0; }
        .theme-option { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; text-align: center; font-size: 12px; font-weight: bold; transition: all 0.2s; }
        .theme-option:hover { border-color: var(--primary); background: #f8fafc; }
        
        .slide-stage-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; overflow: auto; }
        #slideCanvas { background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); cursor: default; }
        #imageUpload { display: none; }
    </style>
</head>
<body>

    <!-- 1. 認証画面 -->
    <div id="authView" class="app-view active">
        <div class="auth-card">
            <div class="auth-logo">MNDI Workspace</div>
            <div id="authSubtitle" class="auth-subtitle">アカウントにログインして開始します</div>
            <div class="auth-input-group">
                <label>メールアドレス</label>
                <input type="email" class="auth-input" id="authEmail" placeholder="example@monndai.com">
            </div>
            <div class="auth-input-group">
                <label>パスワード</label>
                <input type="password" class="auth-input" id="authPassword" placeholder="パスワード">
            </div>
            <button class="auth-btn" id="authSubmitBtn" onclick="handleAuth()">ログイン</button>
            <div class="auth-toggle-link" id="authToggleLink" onclick="toggleAuthMode()">初めてですか？ アカウントを作成する</div>
        </div>
    </div>

    <!-- 2. ダッシュボード画面 -->
    <div id="dashboardView" class="app-view">
        <div class="sidebar">
            <div class="sidebar-logo"><span class="material-icons" style="color:var(--primary)">cloud</span>MNDI</div>
            <div class="nav-item active"><span class="material-icons">folder</span>すべてのファイル</div>
            <div class="sidebar-spacer"></div>
            <div class="nav-item" onclick="logout()"><span class="material-icons">logout</span>ログアウト</div>
        </div>
        <div class="main-content">
            <div class="top-bar">
                <div class="view-title">ローカル ドライブ</div>
                <div class="user-profile">
                    <span id="userDisplayName">---</span>
                    <div class="avatar" id="userAvatar">-</div>
                </div>
            </div>
            <div class="dashboard-body">
                <div class="section-title">新規作成</div>
                <div class="creator-row">
                    <div class="create-card doc" onclick="createNewFile('doc')">
                        <span class="material-icons card-icon">description</span>
                        <span>ドキュメント</span>
                    </div>
                    <div class="create-card slide" onclick="createNewFile('slide')">
                        <span class="material-icons card-icon">slideshow</span>
                        <span>スライド</span>
                    </div>
                </div>
                <div class="section-title">保存されたファイル</div>
                <div class="file-grid" id="fileGrid"></div>
            </div>
        </div>
    </div>

    <!-- 3. ドキュメントエディタ画面 -->
    <div id="docEditorView" class="app-view">
        <div class="sidebar">
            <div class="sidebar-logo" onclick="backToDashboard()" style="cursor:pointer;"><span class="material-icons">arrow_back</span>戻る</div>
            <div class="nav-item active"><span class="material-icons">edit</span>編集</div>
        </div>
        <div class="main-content">
            <div class="top-bar">
                <input type="text" id="docTitle" style="font-size: 18px; font-weight: 600; border:none; outline:none; width:300px;" value="無題のドキュメント">
                <button class="auth-btn" style="width:auto; padding:8px 16px; margin:0;" onclick="backToDashboard()">保存して閉じる</button>
            </div>
            <div class="editor-toolbar">
                <button class="toolbar-btn" onclick="document.execCommand('bold')"><span class="material-icons">format_bold</span></button>
                <button class="toolbar-btn" onclick="document.execCommand('italic')"><span class="material-icons">format_italic</span></button>
                <button class="toolbar-btn" onclick="document.execCommand('underline')"><span class="material-icons">format_underlined</span></button>
            </div>
            <div class="editor-container">
                <div class="document-paper" contenteditable="true" id="docBody"></div>
            </div>
        </div>
    </div>

    <!-- 4. スライドエディタ画面 -->
    <div id="slideEditorView" class="app-view">
        <div class="sidebar">
            <div class="sidebar-logo" onclick="backToDashboard()" style="cursor:pointer;"><span class="material-icons">arrow_back</span>戻る</div>
            <div class="nav-item active"><span class="material-icons">layers</span>キャンバス</div>
            <div class="sidebar-spacer"></div>
            <button class="auth-btn" style="padding:10px; font-size:14px;" onclick="backToDashboard()">保存して閉じる</button>
        </div>
        <div class="main-content">
            <div class="top-bar">
                <input type="text" id="slideTitle" style="font-size: 18px; font-weight: 600; border:none; outline:none; width:300px;" value="無題のスライド">
                <div style="display:flex; gap:10px;">
                    <button class="toolbar-btn" style="background:#f1f5f9" onclick="triggerImageUpload()">
                        <span class="material-icons" style="margin-right:6px;">image</span>画像を挿入
                    </button>
                    <input type="file" id="imageUpload" accept="image/*" onchange="handleImageFile(event)">
                </div>
            </div>
            <div class="editor-toolbar">
                <button class="toolbar-btn" onclick="addTextToSlide()"><span class="material-icons">text_fields</span>テキスト追加</button>
            </div>
            <div class="slide-workspace">
                <div class="slide-sidebar">
                    <div class="slide-thumb active">スライド 1</div>
                </div>
                
                <!-- キャンバスステージ -->
                <div class="slide-stage-container">
                    <canvas id="slideCanvas" width="800" height="450"></canvas>
                </div>

                <!-- 追加：右側のテーマ切替パネル（6パターン） -->
                <div class="theme-sidebar">
                    <div class="section-title" style="margin-bottom:8px;">テーマ（6種）</div>
                    <div class="theme-option" style="background:#ffffff; color:#333;" onclick="changeSlideTheme('#ffffff', '#000000')">① シンプル白</div>
                    <div class="theme-option" style="background:#111827; color:#38bdf8; border-color:#38bdf8;" onclick="changeSlideTheme('#111827', '#38bdf8')">② ダークサイバー</div>
                    <div class="theme-option" style="background:#fff1f2; color:#be123c;" onclick="changeSlideTheme('#fff1f2', '#be123c')">③ サクラピンク</div>
                    <div class="theme-option" style="background:#f0fdf4; color:#166534变量;" onclick="changeSlideTheme('#f0fdf4', '#166534')">④ エコグリーン</div>
                    <div class="theme-option" style="background:#f0f9ff; color:#0369a1;" onclick="changeSlideTheme('#f0f9ff', '#0369a1')">⑤ スカイブルー</div>
                    <div class="theme-option" style="background:#fff7ed; color:#c2410c;" onclick="changeSlideTheme('#fff7ed', '#c2410c')">⑥ サンセット</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isSignUpMode = false;
        let currentUser = null;
        let files = [];
        let currentEditingFile = null;

        // テーマ背景色と標準文字色の状態管理変数
        let currentBgColor = '#ffffff';
        let currentTextColor = '#000000';

        if (!localStorage.getItem('mndi_users')) {
            localStorage.setItem('mndi_users', JSON.stringify({ 'demo@monndai.com': 'password123' }));
        }
        if (!localStorage.getItem('mndi_files')) {
            localStorage.setItem('mndi_files', JSON.stringify([
                { id: '1', name: '2026年度 事業計画書', type: 'doc', date: '2026/05/10', userId: 'demo@monndai.com', content: 'これはブラウザに自動保存されたドキュメントです。書き換えて保存してください。', elementsJson: '', themeBg: '#ffffff', themeText: '#000000' }
            ]));
        }

        window.onload = function() {
            const savedSession = sessionStorage.getItem('mndi_current_user');
            if (savedSession) { successLogin(savedSession); }
        }

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('authSubtitle').innerText = isSignUpMode ? '新しいWorkspaceアカウントを作成します' : 'アカウントにログインして開始します';
            document.getElementById('authSubmitBtn').innerText = isSignUpMode ? 'アカウントを新規登録' : 'ログイン';
            document.getElementById('authToggleLink').innerText = isSignUpMode ? 'すでにアカウントをお持ちですか？ ログイン' : '初めてですか？ アカウントを作成する';
        }

        function handleAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            if(!email || !password) { alert('入力してください'); return; }
            let users = JSON.parse(localStorage.getItem('mndi_users'));

            if (isSignUpMode) {
                if (users[email]) { alert('このメールアドレスは既に登録されています'); } 
                else {
                    users[email] = password;
                    localStorage.setItem('mndi_users', JSON.stringify(users));
                    alert('登録が完了しました！');
                    successLogin(email);
                }
            } else {
                if (users[email] && users[email] === password) { successLogin(email); } 
                else { alert('メールアドレス、またはパスワードが正しくありません'); }
            }
        }

        function successLogin(email) {
            currentUser = email;
            sessionStorage.setItem('mndi_current_user', email);
            document.getElementById('userDisplayName').innerText = email;
            document.getElementById('userAvatar').innerText = email.charAt(0);
            loadLocalFiles();
            switchView('dashboardView');
        }

        function logout() {
            currentUser = null;
            sessionStorage.removeItem('mndi_current_user');
            switchView('authView');
        }

        function loadLocalFiles() {
            const allFiles = JSON.parse(localStorage.getItem('mndi_files')) || [];
            files = allFiles.filter(f => f.userId === currentUser);
            renderFileGrid();
        }

        function createNewFile(type) {
            const id = Date.now().toString();
            const name = type === 'doc' ? '無題のドキュメント' : '無題のスライド';
            const newFile = {
                id: id, name: name, type: type, date: new Date().toLocaleDateString(), userId: currentUser,
                content: type === 'doc' ? 'ここにテキストを入力...' : '',
                elementsJson: type === 'slide' ? JSON.stringify([{ type: 'text', x: 100, y: 150, text: 'テキストをダブルクリックして移動', fontSize: 24, color: '#000000' }]) : '',
                themeBg: '#ffffff', themeText: '#000000'
            };

            const allFiles = JSON.parse(localStorage.getItem('mndi_files')) || [];
            allFiles.unshift(newFile);
            localStorage.setItem('mndi_files', JSON.stringify(allFiles));
            loadLocalFiles();
            openFile(id);
        }

        function openFile(id) {
            const file = files.find(f => f.id === id);
            if (!file) return;
            currentEditingFile = file;

            if (file.type === 'doc') {
                document.getElementById('docTitle').value = file.name;
                document.getElementById('docBody').innerHTML = file.content;
                switchView('docEditorView');
            } else if (file.type === 'slide') {
                document.getElementById('slideTitle').value = file.name;
                currentBgColor = file.themeBg || '#ffffff';
                currentTextColor = file.themeText || '#000000';
                
                const parsedElements = file.elementsJson ? JSON.parse(file.elementsJson) : [];
                slideElements = [];
                parsedElements.forEach(el => {
                    if (el.type === 'image' && el.base64Src) {
                        const img = new Image();
                        img.onload = () => drawSlide();
                        img.src = el.base64Src;
                        el.imgObj = img;
                    }
                    slideElements.push(el);
                });
                switchView('slideEditorView');
            }
        }

        // 修正：戻るボタンの保存バグ・連動バグを改善
        function backToDashboard() {
            if (currentEditingFile) {
                const allFiles = JSON.parse(localStorage.getItem('mndi_files')) || [];
                const index = allFiles.findIndex(f => f.id === currentEditingFile.id);

                if (index !== -1) {
                    if (currentEditingFile.type === 'doc') {
                        allFiles[index].name = document.getElementById('docTitle').value;
                        allFiles[index].content = document.getElementById('docBody').innerHTML;
                    } else if (currentEditingFile.type === 'slide') {
                        const cleanElements = slideElements.map(el => {
                            const copy = { ...el };
                            if (copy.imgObj) { copy.base64Src = copy.imgObj.src; delete copy.imgObj; }
                            return copy;
                        });
                        allFiles[index].name = document.getElementById('slideTitle').value;
                        allFiles[index].elementsJson = JSON.stringify(cleanElements);
                        allFiles[index].themeBg = currentBgColor;
                        allFiles[index].themeText = currentTextColor;
                    }
                    localStorage.setItem('mndi_files', JSON.stringify(allFiles));
                }
            }
            loadLocalFiles();
            switchView('dashboardView');
        }

        function deleteFile(e, id) {
            e.stopPropagation();
            if (confirm('このファイルをブラウザから完全に削除しますか？')) {
                let allFiles = JSON.parse(localStorage.getItem('mndi_files')) || [];
                allFiles = allFiles.filter(f => f.id !== id);
                localStorage.setItem('mndi_files', JSON.stringify(allFiles));
                loadLocalFiles();
            }
        }

        function renderFileGrid() {
            const grid = document.getElementById('fileGrid');
            grid.innerHTML = '';
            files.forEach(file => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.onclick = () => openFile(file.id);
                
                const icon = file.type === 'doc' ? 'description' : 'slideshow';
                const iconColor = file.type === 'doc' ? '#1a73e8' : '#f4b400';

                card.innerHTML = `
                    <div class="file-icon-row">
                        <span class="material-icons" style="color:${iconColor}; font-size:28px;">${icon}</span>
                        <button class="delete-btn" onclick="deleteFile(event, '${file.id}')"><span class="material-icons">delete</span></button>
                    </div>
                    <div class="file-name">${file.name}</div>
                    <div class="file-date">${file.date}</div>
                `;
                grid.appendChild(card);
            });
        }

        function switchView(viewId) {
            document.querySelectorAll('.app-view').forEach(view => view.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if(viewId === 'slideEditorView') { initSlideCanvas(); }
        }

        // ==========================================================================
        // スライド Canvas 描画エンジン（テーマ切替連動）
        // ==========================================================================
        let sCanvas, sCtx;
        let slideElements = [];
        let selectedElement = null;
        let isDragging = false;
        let dragOffsetX = 0; dragOffsetY = 0;

        function initSlideCanvas() {
            sCanvas = document.getElementById('slideCanvas');
            sCtx = sCanvas.getContext('2d');
            sCanvas.onmousedown = handleCanvasMouseDown;
            sCanvas.onmousemove = handleCanvasMouseMove;
            sCanvas.onmouseup = () => { isDragging = false; };
            drawSlide();
        }

        function drawSlide() {
            if(!sCtx) return;
            sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
            
            // 修正：選択されたテーマカラーに基づいて背景を塗りつぶし
            sCtx.fillStyle = currentBgColor;
            sCtx.fillRect(0, 0, sCanvas.width, sCanvas.height);

            slideElements.forEach(el => {
                if (el.type === 'text') {
                    // テキストの色がデフォルト黒ならテーマの文字色に連動、カスタム色があればそれを優先
                    sCtx.fillStyle = (el.color === '#000000' || !el.color) ? currentTextColor : el.color;
                    sCtx.font = `${el.fontSize}px sans-serif`;
                    sCtx.textBaseline = 'top';
                    sCtx.fillText(el.text, el.x, el.y);
                    if (el === selectedElement) {
                        sCtx.strokeStyle = '#1a73e8'; sCtx.lineWidth = 1;
                        const width = sCtx.measureText(el.text).width;
                        sCtx.strokeRect(el.x - 4, el.y - 4, width + 8, el.fontSize + 8);
                    }
                } else if (el.type === 'image' && el.imgObj) {

                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }
