<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNDI Local Workspace</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f8fafc; --bg-side: #ffffff; --primary: #1a73e8; 
            --primary-hover: #1557b0; --text-main: #1e293b; --text-sub: #64748b;
            --border: #e2e8f0; --shadow: 0 4px 12px rgba(0,0,0,0.05); --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: var(--bg-main); color: var(--text-main); overflow: hidden; height: 100vh; display: flex; -webkit-tap-highlight-color: transparent; }
        .app-view { display: none; width: 100%; height: 100%; }
        .app-view.active { display: flex; }

        /* 認証画面 */
        #authView { justify-content: center; align-items: center; background: linear-gradient(135deg, #eef2f7, #e0e7ff); width: 100%; }
        .auth-card { background: #ffffff; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        .auth-logo { font-weight: bold; font-size: 28px; margin-bottom: 8px; }
        .auth-subtitle { color: var(--text-sub); margin-bottom: 32px; font-size: 14px;}
        .auth-input-group { text-align: left; margin-bottom: 20px; }
        .auth-input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--text-sub); }
        .auth-input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 15px; outline: none; }
        .auth-btn { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer; }
        .auth-toggle-link { margin-top: 20px; font-size: 14px; color: var(--primary); cursor: pointer; display: inline-block; }

        /* 共通レイアウト */
        .sidebar { width: 260px; background-color: var(--bg-side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 16px; flex-shrink: 0; }
        .sidebar-logo { font-weight: bold; font-size: 22px; margin-bottom: 32px; display: flex; align-items: center; gap: 8px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: var(--radius); cursor: pointer; color: var(--text-sub); font-weight: 500; margin-bottom: 4px; }
        .nav-item:hover, .nav-item.active { background-color: #f1f5f9; color: var(--primary); }
        .sidebar-spacer { flex-grow: 1; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .top-bar { height: 64px; background-color: #ffffff; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; }
        .view-title { font-size: 18px; font-weight: 600; }
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 32px; height: 32px; background: #e2e8f0; border-radius: 50%; display:flex; align-items:center; justify-content:center; font-weight:bold; color:var(--primary); }

        .content-body { flex-grow: 1; overflow: hidden; display: none; flex-direction: column; }
        .content-body.active { display: flex; }

        /* ダッシュボード */
        #dashboardContent { padding: 32px; overflow-y: auto; }
        .creator-row { display: flex; gap: 20px; margin-bottom: 32px; }
        .create-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; width: 150px; text-align: center; cursor: pointer; box-shadow: var(--shadow); }
        .section-title { font-size: 14px; font-weight: 600; color: var(--text-sub); margin-bottom: 16px; margin-top: 16px;}
        .template-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .template-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; text-align: center; box-shadow: var(--shadow); font-size: 13px; font-weight: bold; }

        /* ツールバー & パレット */
        .editor-toolbar { height: 48px; background-color: #ffffff; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 12px; user-select: none; }
        .color-palette { display: flex; gap: 4px; align-items: center; }
        .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 1px solid #cbd5e1; touch-action: manipulation; }
        .action-btn { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; touch-action: manipulation; }

        .editor-container { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; gap: 20px; background-color: #f1f5f9; }
        .document-paper { background: white; width: 100%; max-width: 800px; min-height: 800px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 40px; outline: none; font-size: 16px; line-height: 1.6; }

        /* スライド */
        .slide-workspace { flex-grow: 1; display: flex; background-color: #e2e8f0; overflow: hidden; }
        .slide-sidebar { width: 180px; background: white; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px 12px; gap: 10px; overflow-y: auto; user-select: none; }
        .slide-thumb-item { padding: 10px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 12px; text-align: center; background: #f8fafc; }
        .slide-thumb-item.active { border-color: var(--primary); background: #eff6ff; font-weight: bold; }
        .layout-option { padding: 6px; border: 1px dashed var(--border); border-radius: 4px; cursor: pointer; font-size: 11px; text-align: center; margin-top: 4px; }
        
        .theme-sidebar { width: 160px; background: white; border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px 12px; gap: 10px; user-select: none; }
        .theme-option { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; text-align: center; font-size: 12px; font-weight: bold; }
        
        .slide-stage-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .slide-paper { background: white; width: 100%; aspect-ratio: 16/9; max-width: 700px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 40px; outline: none; font-size: 24px; display: grid; align-items: center; text-align: center; transition: all 0.3s; white-space: pre-line; }

        /* 全画面スライドショー用 */
        .presentation-mode { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 9999; display: none; justify-content: center; align-items: center; }
        .presentation-mode.active { display: flex; }
        .presentation-slide { background: white; width: 90vw; aspect-ratio: 16/9; max-width: 1200px; display: grid; align-items: center; text-align: center; font-size: 44px; padding: 40px; box-shadow: 0 0 30px rgba(255,255,255,0.2); outline: none; }
    </style>
</head>
<body>

    <!-- 1. 認証画面 -->
    <div id="authView" class="app-view active">
        <div class="auth-card">
            <div class="auth-logo">MNDI</div>
            <div id="authSubtitle" class="auth-subtitle">ローカルワークスペースへログイン</div>
            <div class="auth-input-group">
                <label>メールアドレス</label>
                <input type="email" id="emailInput" class="auth-input" value="admin@example.com">
            </div>
            <div class="auth-input-group">
                <label>パスワード</label>
                <input type="password" id="passwordInput" class="auth-input" value="123456">
            </div>
            <button class="auth-btn" id="submitBtn">ログインする</button>
            <div class="auth-toggle-link" id="toggleAuthMode">初めてですか？ アカウントを作成する</div>
        </div>
    </div>

    <!-- 2. メインアプリ画面 -->
    <div id="mainView" class="app-view">
        <div class="sidebar">
            <div class="sidebar-logo"><span class="material-icons">folder</span> MNDI</div>
            <div class="nav-item active" id="navDashboard"><span class="material-icons">dashboard</span>ダッシュボード</div>
            <div class="nav-item" id="navDocEditor"><span class="material-icons">article</span>ドキュメント</div>
            <div class="nav-item" id="navSlideEditor"><span class="material-icons">analytics</span>スライド</div>
            <div class="sidebar-spacer"></div>
            <div class="nav-item" id="logoutBtn" style="color: #ef4444;"><span class="material-icons">logout</span>ログアウト</div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <div class="view-title" id="viewTitle">ダッシュボード</div>
                <div class="user-profile"><div class="avatar" id="userAvatar">A</div><span id="userDisplayName">admin</span></div>
            </div>

            <!-- A. ダッシュボード -->
            <div id="dashboardContent" class="content-body active">
                <div class="section-title">新規作成</div>
                <div class="creator-row">
                    <div class="create-card" id="createDocBtn"><span class="material-icons" style="color:#1a73e8">article</span><br>新しい文書</div>
                    <div class="create-card" id="createSlideBtn"><span class="material-icons" style="color:#f4b400">analytics</span><br>新しいスライド</div>
                </div>
                <div class="section-title">テンプレートから選ぶ</div>
                <div class="template-grid">
                    <div class="template-card" onclick="loadTpl('doc','ビジネス報告書\n【概要】\n【実績】')">📄 ビジネス報告書</div>
                    <div class="template-card" onclick="loadTpl('doc','履歴書\n【氏名】\n【職歴】')">📄 履歴書</div>
                    <div class="template-card" onclick="loadTpl('slide','会社概要\n\n設立：2026年\n事業：ITツール開発')">📊 会社概要</div>
                    <div class="template-card" onclick="loadTpl('slide','自己紹介\n\n名前：\n趣味：プログラム開発')">📊 自己紹介</div>
                </div>
            </div>

            <!-- B. ドキュメントエディタ -->
            <div id="docEditorContent" class="content-body">
                <div class="editor-toolbar">
                    <button class="action-btn" id="addDocPageBtn">📄 ページ追加</button>
                    <span>文字色:</span>
                    <div class="color-palette" id="docColors"></div>
                </div>
                <div class="editor-container" id="docContainer">
                    <div class="document-paper" contenteditable="true">テキストを入力...</div>
                </div>
            </div>

            <!-- C. スライドエディタ -->
            <div id="slideEditorContent" class="content-body">
                <div class="editor-toolbar">
                    <button class="action-btn" id="addSlidePageBtn" style="background:#f4b400;">➕ スライド追加</button>
                    <button class="action-btn" id="startShowBtn" style="background:#10b981;">▶ スライドショー</button>
                    <span>文字色:</span>
                    <div class="color-palette" id="slideColors"></div>
                </div>
                <div class="slide-workspace">
                    <div class="slide-sidebar">
                        <div class="section-title">ページ一覧</div>
                        <div id="slideThumbList"></div>
                        <div class="section-title" style="margin-top:10px;">クイック配置</div>
                        <div class="layout-option" onclick="applyLayout('center')">中央見出し</div>
                        <div class="layout-option" onclick="applyLayout('left')">左寄せリスト</div>
                        <div class="layout-option" onclick="applyLayout('split')">左右2カラム</div>
                    </div>
                    <div class="slide-stage-container">
                        <div class="slide-paper" id="slidePaper" contenteditable="true">スライド 1 のテキスト</div>
                    </div>
                    <div class="theme-sidebar">
                        <div class="section-title">背景テーマ</div>
                        <div class="theme-option" style="background:#fff; color:#000;" onclick="setTheme('#fff','#000')">ライト</div>
                        <div class="theme-option" style="background:#1e293b; color:#fff;" onclick="setTheme('#1e293b','#fff')">ダーク</div>
                        <div class="theme-option" style="background:#f4ecd8; color:#5b4636;" onclick="setTheme('#f4ecd8','#5b4636')">セピア</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 全画面スライドショー用の舞台 -->
    <div id="presentationMode" class="presentation-mode">
        <div class="presentation-slide" id="presentationSlide"></div>
    </div>

    <script>
        const colors = ['#000000','#ef4444','#f97316','#f59e0b','#10b981','#3b82f6','#6366f1','#a855f7','#64748b','#1e293b','#fff0f5','#e6f7f0'];
        let lastSelection = null;

        // iPad対応：文字選択を記憶する
        function saveSelection() {
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                lastSelection = sel.getRangeAt(0).cloneRange();
            }
        }
        document.addEventListener('selectionchange', saveSelection);

        // iPad対応：記憶した選択範囲に色を適用する
        function changeColor(color) {
            const sel = window.getSelection();
            if (lastSelection) {
                sel.removeAllRanges();
                sel.addRange(lastSelection);
            }
            document.execCommand('foreColor', false, color);
        }

        // 12色のパレット生成
        function initColors(containerId) {
            const container = document.getElementById(containerId);
            colors.forEach(c => {
                const dot = document.createElement('div');
                dot.className = 'color-dot';
                dot.style.backgroundColor = c;
                // iPadで選択解除を防ぐため pointerdown (または touchstart) を使用
                dot.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    changeColor(c);
                });
                container.appendChild(dot);
            });
        }
        initColors('docColors');
        initColors('slideColors');

        // 各種ログイン・表示切り替え処理
        const submitBtn = document.getElementById('submitBtn');
        const toggleAuthMode = document.getElementById('toggleAuthMode');
        const authSubtitle = document.getElementById('authSubtitle');
        const mainView = document.getElementById('mainView');
        const authView = document.getElementById('authView');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const userDisplayName = document.getElementById('userDisplayName');
        const userAvatar = document.getElementById('userAvatar');
        const viewTitle = document.getElementById('viewTitle');

        let isLoginMode = true;

        if (!localStorage.getItem("admin@example.com")) localStorage.setItem("admin@example.com", "123456");

        toggleAuthMode.onclick = () => {
            isLoginMode = !isLoginMode;
            authSubtitle.textContent = isLoginMode ? 'ローカルワークスペースへログイン' : '新規アカウントの登録（自由に入力可能）';
            submitBtn.textContent = isLoginMode ? 'ログインする' : '新規登録する';
            toggleAuthMode.textContent = isLoginMode ? '初めてですか？ アカウントを作成する' : '既にアカウントをお持ちですか？ ログイン';
        };

        submitBtn.onclick = () => {
            const email = emailInput.value.trim(), password = passwordInput.value.trim();
            if (!email || !password) { alert('すべての項目を入力してください！'); return; }

            if (isLoginMode) {
                if (localStorage.getItem(email) === password) loginSuccess(email);
                else alert('認証情報が間違っています！');
            } else {
                if (localStorage.getItem(email)) { alert('既に登録されています！'); return; }
                localStorage.setItem(email, password);
                alert('アカウントが作成されました！');
                loginSuccess(email);
            }
        };

        function loginSuccess(email) {
            userDisplayName.textContent = email.split('@')[0];
            userAvatar.textContent = email.charAt(0).toUpperCase();
            authView.classList.remove('active');
            mainView.classList.add('active');
            showSec('dashboard');
        }

        document.getElementById('logoutBtn').onclick = () => { mainView.classList.remove('active'); authView.classList.add('active'); };

        function showSec(sec) {
            document.getElementById('dashboardContent').classList.remove('active');
            document.getElementById('docEditorContent').classList.remove('active');
            document.getElementById('slideEditorContent').classList.remove('active');
            document.getElementById('navDashboard').classList.remove('active');
            document.getElementById('navDocEditor').classList.remove('active');
            document.getElementById('navSlideEditor').classList.remove('active');

            document.getElementById(sec + 'Content').classList.add('active');
            document.getElementById('nav' + sec.charAt(0).toUpperCase() + sec.slice(1) + 'Editor' || 'navDashboard').classList.add('active');
            viewTitle.textContent = sec === 'dashboard' ? 'ダッシュボード' : sec.toUpperCase() + ' エディタ';
        }

        document.getElementById('navDashboard').onclick = () => showSec('dashboard');
        document.getElementById('navDocEditor').onclick = () => showSec('doc');
        document.getElementById('navSlideEditor').onclick = () => showSec('slide');
        document.getElementById('createDocBtn').onclick = () => showSec('doc');
        document.getElementById('createSlideBtn').onclick = () => showSec('slide');

        // ドキュメントのページを増やす
        document.getElementById('addDocPageBtn').onclick = () => {
            const newPage = document.createElement('div');
            newPage.className = 'document-paper';
            newPage.contentEditable = 'true';
            newPage.style.marginTop = '20px';
            newPage.innerText = '新しいページ...';
            document.getElementById('docContainer').appendChild(newPage);
        };

        // スライド複数枚管理
        let slidesData = ['スライド 1 のテキスト'];
        let currentSlideIdx = 0;
        let slideBg = '#ffffff', slideFg = '#000000';

        function renderThumbs() {
            const list = document.getElementById('slideThumbList');
            list.innerHTML = '';
            slidesData.forEach((content, idx) => {
                const thumb = document.createElement('div');
                thumb.className = `slide-thumb-item ${idx === currentSlideIdx ? 'active' : ''}`;
                thumb.innerText = `スライド ${idx + 1}`;
                thumb.onclick = () => {
                    saveCurrentSlideText();
                    currentSlideIdx = idx;
                    loadCurrentSlideText();
                    renderThumbs();
                };
                list.appendChild(thumb);
            });
        }

        function saveCurrentSlideText() { slidesData[currentSlideIdx] = document.getElementById('slidePaper').innerText; }
        function loadCurrentSlideText() { document.getElementById('slidePaper').innerText = slidesData[currentSlideIdx]; }

        document.getElementById('addSlidePageBtn').onclick = () => {
            saveCurrentSlideText();
            slidesData.push(`新しいスライド ${slidesData.length + 1} のテキスト`);
            currentSlideIdx = slidesData.length - 1;
            loadCurrentSlideText();
            renderThumbs();
        };

        document.getElementById('slidePaper').oninput = () => { saveCurrentSlideText(); };

        // 全画面スライドショー
        let isPresentation = false;
        const presView = document.getElementById('presentationMode');
        const presSlide = document.getElementById('presentationSlide');

        document.getElementById('startShowBtn').onclick = () => {
            saveCurrentSlideText();
            if(slidesData.length === 0) return;
            isPresentation = true;
            presView.classList.add('active');
            updatePresSlide();
        };

        function updatePresSlide() {
            presSlide.innerText = slidesData[currentSlideIdx];
            presSlide.style.backgroundColor = slideBg;
            presSlide.style.color = slideFg;
        }

        window.addEventListener('keydown', (e) => {
            if (!isPresentation) return;
            if (e.key === 'Escape') { quitPres(); }
            if (e.key === 'ArrowRight' || e.key === ' ') { nextPres(); }
            if (e.key === 'ArrowLeft') { prevPres(); }
        });

        // iPad用：タップで進む・スワイプの代わりに簡易めくり
        presView.onclick = () => { nextPres(); };

        function nextPres() {
            if(currentSlideIdx < slidesData.length - 1) { currentSlideIdx++; updatePresSlide(); } 
            else { quitPres(); }
        }
        function prevPres() {
            if(currentSlideIdx > 0) { currentSlideIdx--; updatePresSlide(); }
        }
        function quitPres() {
            isPresentation = false; presView.classList.remove('active'); renderThumbs(); loadCurrentSlideText();
        }

        function loadTpl(type, txt) {
            if(type==='doc') { document.getElementById('documentPaper').innerText = txt; showSec('doc'); }
            else { slidesData = [txt]; currentSlideIdx = 0; loadCurrentSlideText(); renderThumbs(); showSec('slide'); }
        }

        function setTheme(bg, fg) {
            slideBg = bg; slideFg = fg;
            const p = document.getElementById('slidePaper');
            p.style.backgroundColor = bg; p.style.color = fg;
        }

        function applyLayout(type) {
            const p = document.getElementById('slidePaper');
            if (type === 'center') p.innerText = '【タイトル】\nここに中央サブタイトル';
            else if (type === 'left') p.innerText = '■ 見出し\n・テキスト1\n・テキスト2';
            else if (type === 'split') p.innerText = '左のカラム  |  右のカラム';
            saveCurrentSlideText();
        }

        renderThumbs();
    </script>
</body>
</html>
