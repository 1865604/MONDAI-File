    <!-- スクリプト制御（ログイン認証制限と機能の統合版） -->
    <script>
        const colors = ['#000000','#edf2f7','#ef4444','#f97316','#f59e0b','#10b981','#3b82f6','#6366f1','#a855f7','#ec4899','#64748b','#1e293b'];
        
        // 12色のパレット自動生成
        function initColors(containerId, targetEl) {
            const container = document.getElementById(containerId);
            colors.forEach(c => {
                const dot = document.createElement('div');
                dot.className = 'color-dot';
                dot.style.backgroundColor = c;
                dot.onclick = () => { document.execCommand('foreColor', false, c); };
                container.appendChild(dot);
            });
        }
        initColors('docColors', document.getElementById('documentPaper'));
        initColors('slideColors', document.getElementById('slidePaper'));

        // ログイン・ナビ切り替え処理
        const submitBtn = document.getElementById('submitBtn');
        const mainView = document.getElementById('mainView');
        const authView = document.getElementById('authView');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const userDisplayName = document.getElementById('userDisplayName');
        const userAvatar = document.getElementById('userAvatar');

        // 【修正】正しいログイン情報を判定する処理
        submitBtn.onclick = () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            // 正しいアカウント情報（ここを自由に変更できます）
            const correctEmail = "admin@example.com";
            const correctPassword = "123456";

            if (email === correctEmail && password === correctPassword) {
                // 一致した場合はログイン成功
                const userName = email.split('@')[0];
                userDisplayName.textContent = userName;
                userAvatar.textContent = userName.charAt(0).toUpperCase();

                authView.classList.remove('active');
                mainView.classList.add('active');
                showSec('dashboard');
            } else {
                // 間違っている場合は警告を表示してブロック
                alert('メールアドレスまたはパスワードが間違っています！');
            }
        };

        document.getElementById('logoutBtn').onclick = () => {
            mainView.classList.remove('active');
            authView.classList.add('active');
            // ログアウト時に入力欄をリセット
            emailInput.value = '';
            passwordInput.value = '';
        };

        function showSec(sec) {
            document.getElementById('dashboardContent').classList.remove('active');
            document.getElementById('docEditorContent').classList.remove('active');
            document.getElementById('slideEditorContent').classList.remove('active');
            document.getElementById(sec + 'Content').classList.add('active');
            document.getElementById('viewTitle').textContent = sec.toUpperCase();
        }

        document.getElementById('navDashboard').onclick = () => showSec('dashboard');
        document.getElementById('navDocEditor').onclick = () => showSec('doc');
        document.getElementById('navSlideEditor').onclick = () => showSec('slide');
        document.getElementById('createDocBtn').onclick = () => showSec('doc');
        document.getElementById('createSlideBtn').onclick = () => showSec('slide');

        // テンプレート読み込み
        function loadTpl(type, txt) {
            if(type==='doc') { document.getElementById('documentPaper').innerText = txt; showSec('doc'); }
            else { document.getElementById('slidePaper').innerText = txt; showSec('slide'); }
        }

        // 背景切り替え
        function setTheme(bg, fg) {
            const p = document.getElementById('slidePaper');
            p.style.backgroundColor = bg; p.style.color = fg;
        }

        // スライドレイアウト10種の切り替え
        function applyLayout(type) {
            const p = document.getElementById('slidePaper');
            p.style.display = 'grid';
            p.style.textAlign = 'center';
            p.style.padding = '40px';
            
            if (type === 'center') { p.innerText = '【タイトル】\nここに中央サブタイトルが入ります'; }
            else if (type === 'left') { p.style.textAlign = 'left'; p.innerText = '■ 見出しの見出し\n・箇条書きテキスト1\n・箇条書きテキスト2'; }
            else if (type === 'split') { p.innerText = '左側のコンテンツエリア  |  右側のコンテンツエリア'; }
            else if (type === 'topTitle') { p.innerText = '【上部固定見出し】\n\nここに本文のメインテキストを記述します。'; }
            else if (type === 'bigStat') { p.innerText = '95%\n業界圧倒的ナンバーワンのシェア率'; }
            else if (type === 'quote') { p.innerText = '“ここに重要な引用フレーズや\n残したい言葉を記述します”'; }
            else if (type === 'grid3') { p.innerText = '[要素A] メリット1\n[要素B] メリット2\n[要素C] メリット3'; }
            else if (type === 'darkHero') { setTheme('#0f172a','#f8fafc'); p.innerText = 'MISSION\n世界を変える、仕組みをつくる。'; }
            else if (type === 'caption') { p.innerText = 'メインのグラフィック表示スペース\n（下部：補足説明用キャプションテキスト）'; }
            else if (type === 'agenda') { p.innerText = 'ーー 目次 ーー\n1. はじめに\n2. 課題定義\n3. 解決策\n4. 今後の展望'; }
        }
    </script>
