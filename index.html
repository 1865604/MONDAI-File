    <!-- 💡 すべての画面切り替えと、テーマ変更を制御するJavaScript -->
    <script>
        // ビュー要素
        const authView = document.getElementById('authView');
        const mainView = document.getElementById('mainView');
        
        // コンテンツ要素
        const dashboardContent = document.getElementById('dashboardContent');
        const docEditorContent = document.getElementById('docEditorContent');
        const slideEditorContent = document.getElementById('slideEditorContent');

        // ボタン・ナビ要素
        const submitBtn = document.getElementById('submitBtn');
        const toggleAuthMode = document.getElementById('toggleAuthMode');
        const logoutBtn = document.getElementById('logoutBtn');
        const viewTitle = document.getElementById('viewTitle');

        const navDashboard = document.getElementById('navDashboard');
        const navDocEditor = document.getElementById('navDocEditor');
        const navSlideEditor = document.getElementById('navSlideEditor');

        const createDocBtn = document.getElementById('createDocBtn');
        const createSlideBtn = document.getElementById('createSlideBtn');
        
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const userDisplayName = document.getElementById('userDisplayName');
        const userAvatar = document.getElementById('userAvatar');

        let isLoginMode = true;

        // 1. ログイン・登録切り替え
        toggleAuthMode.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            document.getElementById('authSubtitle').textContent = isLoginMode ? 'ローカルワークスペースへログイン' : '新規アカウントの登録';
            submitBtn.textContent = isLoginMode ? 'ログインする' : '登録する';
            toggleAuthMode.textContent = isLoginMode ? '初めてですか？ アカウントを作成する' : '既にアカウントをお持ちですか？ ログイン';
        });

        // 2. ログイン実行
        submitBtn.addEventListener('click', () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            if (!email || !password) { alert('入力してください！'); return; }

            const userName = email.split('@')[0];
            userDisplayName.textContent = userName;
            userAvatar.textContent = userName.charAt(0).toUpperCase();

            authView.classList.remove('active');
            mainView.classList.add('active');
            showSection('dashboard');
        });

        // 3. 表示セクション切り替え関数
        function showSection(sectionName) {
            dashboardContent.classList.remove('active');
            docEditorContent.classList.remove('active');
            slideEditorContent.classList.remove('active');
            
            navDashboard.classList.remove('active');
            navDocEditor.classList.remove('active');
            navSlideEditor.classList.remove('active');

            if (sectionName === 'dashboard') {
                dashboardContent.classList.add('active');
                navDashboard.classList.add('active');
                viewTitle.textContent = 'ダッシュボード';
            } else if (sectionName === 'doc') {
                docEditorContent.classList.add('active');
                navDocEditor.classList.add('active');
                viewTitle.textContent = 'ドキュメントエディタ';
            } else if (sectionName === 'slide') {
                slideEditorContent.classList.add('active');
                navSlideEditor.classList.add('active');
                viewTitle.textContent = 'スライドエディタ';
            }
        }

        // 4. ナビゲーションと新規作成ボタンの連動
        navDashboard.addEventListener('click', () => showSection('dashboard'));
        navDocEditor.addEventListener('click', () => showSection('doc'));
        navSlideEditor.addEventListener('click', () => showSection('slide'));

        createDocBtn.addEventListener('click', () => showSection('doc'));
        createSlideBtn.addEventListener('click', () => showSection('slide'));

        // 【新機能】スライドのテーマ（ライト・ダーク）切り替え
        const themeOptions = document.querySelectorAll('.theme-option');
        const slidePaper = document.querySelector('.slide-paper');

        themeOptions.forEach(option => {
            option.addEventListener('click', () => {
                if (option.textContent === 'ライト') {
                    slidePaper.style.background = 'white';
                    slidePaper.style.color = 'black';
                } else if (option.textContent === 'ダーク') {
                    slidePaper.style.background = '#1e293b';
                    slidePaper.style.color = 'white';
                }
            });
        });

        // 5. ログアウト
        logoutBtn.addEventListener('click', () => {
            mainView.classList.remove('active');
            authView.classList.add('active');
            emailInput.value = '';
            passwordInput.value = '';
        });
    </script>
