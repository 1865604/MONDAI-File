<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNDI Local Workspace</title>
    <!-- Google Material Icons -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-side: #ffffff;
            --primary: #1a73e8; 
            --primary-hover: #1557b0;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        .app-view { display: none; width: 100%; height: 100%; }
        .app-view.active { display: flex; }

        /* 1. 認証画面 */
        #authView {
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #eef2f7, #e0e7ff);
            width: 100%;
        }
        .auth-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .auth-logo { font-weight: bold; font-size: 28px; letter-spacing: 1px; margin-bottom: 8px; color: #0f172a; }
        .auth-subtitle { color: var(--text-sub); margin-bottom: 32px; font-size: 14px;}
        .auth-input-group { text-align: left; margin-bottom: 20px; }
        .auth-input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--text-sub); }
        .auth-input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 15px; outline: none; transition: border 0.2s; }
        .auth-input:focus { border-color: var(--primary); }
        .auth-btn { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .auth-btn:hover { background-color: var(--primary-hover); }
        .auth-toggle-link { margin-top: 20px; font-size: 14px; color: var(--primary); cursor: pointer; display: inline-block; }
        .auth-toggle-link:hover { text-decoration: underline; }

        /* 共通レイアウト */
        .sidebar { width: 260px; background-color: var(--bg-side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 16px; flex-shrink: 0; }
        .sidebar-logo { font-weight: bold; font-size: 22px; padding-left: 12px; margin-bottom: 32px; display: flex; align-items: center; gap: 8px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: var(--radius); cursor: pointer; color: var(--text-sub); font-weight: 500; margin-bottom: 4px; transition: all 0.2s; }
        .nav-item:hover, .nav-item.active { background-color: #f1f5f9; color: var(--primary); }
        .sidebar-spacer { flex-grow: 1; }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .top-bar { height: 64px; background-color: #ffffff; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; flex-shrink: 0; }
        .view-title { font-size: 18px; font-weight: 600; }
        .user-profile { display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 500;}
        .avatar { width: 32px; height: 32px; background: #e2e8f0; border-radius: 50%; display:flex; align-items:center; justify-content:center; font-weight:bold; color:var(--primary); text-transform: uppercase;}

        /* コンテンツエリア切り替え用 */
        .content-body { flex-grow: 1; overflow: hidden; display: none; flex-direction: column; }
        .content-body.active { display: flex; }

        /* 2. ダッシュボード */
        #dashboardContent { padding: 32px; overflow-y: auto; }
        .creator-row { display: flex; gap: 20px; margin-bottom: 40px; }
        .create-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; width: 150px; text-align: center; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow); }
        .create-card:hover { transform: translateY(-2px); border-color: var(--primary); }
        .create-card .card-icon { font-size: 32px; margin-bottom: 8px; display: block; }
        .create-card.doc .card-icon { color: #1a73e8; }
        .create-card.slide .card-icon { color: #f4b400; }
        .create-card span { display: block; font-size: 14px; font-weight: 600; color: var(--text-main); }

        .section-title { font-size: 14px; font-weight: 600; color: var(--text-sub); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px;}

        /* 3. ドキュメントエディタ */
        .editor-toolbar { height: 48px; background-color: #ffffff; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 8px; flex-shrink: 0; }
        .toolbar-btn { background: none; border: none; padding: 6px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; color: #475569; }
        .toolbar-btn:hover { background-color: #f1f5f9; color: var(--text-main); }
        .editor-container { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; background-color: #f1f5f9; }
        .document-paper { background: white; width: 100%; max-width: 800px; min-height: 1000px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 60px 80px; outline: none; font-size: 16px; line-height: 1.6; }

        /* 4. スライドエディタ */
        .slide-workspace { flex-grow: 1; display: flex; background-color: #e2e8f0; overflow: hidden; }
        .slide-sidebar { width: 160px; background: white; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px 12px; gap: 12px; overflow-y: auto; flex-shrink: 0; }
        .slide-thumb { width: 100%; aspect-ratio: 16/9; background: #f8fafc; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text-sub); }
        .slide-thumb.active { border-color: var(--primary); background-color: #eff6ff; }
        
        .theme-sidebar { width: 180px; background: white; border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px 12px; gap: 10px; overflow-y: auto; flex-shrink: 0; }
        .theme-option { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; text-align: center; font-size: 12px; font-weight: bold; transition: all 0.2s; }
        .theme-option:hover { border-color: var(--primary); background: #f8fafc; }
        
        .slide-stage-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; overflow: hidden; }
        .slide-paper { background: white; width: 100%; aspect-ratio: 16/9; max-width: 700px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 40px; outline: none; font-size: 24px; display: flex; flex-direction: column; justify-content: center; text-align: center; }
    </style>
</head>
<body>

    <!-- 1. 認証画面 -->
    <div id="authView" class="app-view active">
        <div class="auth-card">
            <div class="auth-logo">MNDI</div>
            <div id="authSubtitle" class="auth-subtitle">ローカルワークスペースへログイン</div>
            
            <div class="auth-input-group">
                <label>メールアドレス</label>
                <input type="email" id="emailInput" class="auth-input" placeholder="example@email.com" required>
            </div>
            <div class="auth-input-group">
                <label>パスワード</label>
                <input type="password" id="passwordInput" class="auth-input" placeholder="••••••••" required>
            </div>

            <button class="auth-btn" id="submitBtn">ログインする</button>
            <div class="auth-toggle-link" id="toggleAuthMode">初めてですか？ アカウントを作成する</div>
        </div>
    </div>

    <!-- 2. メインアプリ画面 -->
    <div id="mainView" class="app-view">
        <!-- サイドバー -->
        <div class="sidebar">
            <div class="sidebar-logo"><span class="material-icons">folder</span> MNDI</div>
            <div class="nav-item active" id="navDashboard"><span class="material-icons">dashboard</span>ダッシュボード</div>
            <div class="nav-item" id="navDocEditor"><span class="material-icons">article</span>ドキュメント</div>
            <div class="nav-item" id="navSlideEditor"><span class="material-icons">analytics</span>スライド</div>
            <div class="sidebar-spacer"></div>
            <div class="nav-item" id="logoutBtn" style="color: #ef4444;"><span class="material-icons">logout</span>ログアウト</div>
        </div>

        <!-- メインコンテンツ -->
        <div class="main-content">
            <!-- トップバー -->
            <div class="top-bar">
                <div class="view-title" id="viewTitle">ダッシュボード</div>
                <div class="user-profile">
                    <div class="avatar" id="userAvatar">M</div>
                    <span id="userDisplayName">ユーザー</span>
                </div>
            </div>

            <!-- A. ダッシュボード表示 -->
            <div id="dashboardContent" class="content-body active">
                <div class="section-title">新規作成</div>
                <div class="creator-row">
                    <div class="create-card doc" id="createDocBtn">
                        <span class="material-icons card-icon">article</span>
                        <span>新しい文書</span>
                    </div>
                    <div class="create-card slide" id="createSlideBtn">
                        <span class="material-icons card-icon">analytics</span>
                        <span>新しいスライド</span>
                    </div>
                </div>
            </div>

            <!-- B. ドキュメントエディタ表示 -->
            <div id="docEditorContent" class="content-body">
                <div class="editor-toolbar">
                    <button class="toolbar-btn"><span class="material-icons">format_bold</span></button>
                    <button class="toolbar-btn"><span class="material-icons">format_italic</span></button>
                    <button class="toolbar-btn"><span class="material-icons">format_underlined</span></button>
                </div>
                <div class="editor-container">
                    <div class="document-paper" contenteditable="true">ここで文書を編集できます。文字を入力してください...</div>
                </div>
            </div>

            <!-- C. スライドエディタ表示 -->
            <div id="slideEditorContent" class="content-body">
                <div class="slide-workspace">
                    <div class="slide-sidebar">
                        <div class="slide-thumb active">スライド 1</div>
                    </div>
                    <div class="slide-stage-container">
                        <div class="slide-paper" contenteditable="true">クリックしてタイトルを入力</div>
                    </div>
                    <div class="theme-sidebar">
                        <div class="section-title">テーマ</div>
                        <div class="theme-option" style="background: white; color: black;">ライト</div>
                        <div class="theme-option" style="background: #1e293b; color: white;">ダーク</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- 💡 すべての画面切り替えを制御するJavaScript -->
    <script>
        // ビュー要素
        const authView = document.getElementById('authView');
        const mainView = document.getElementById('mainView');
        
        // コンテンツ要素
        const dashboardContent = document.getElementById('dashboardContent');
        const docEditorContent = document.getElementById('docEditorContent');
        const slideEditorContent = document.getElementById('slideEditorContent');

        // ボタン・ナビ要素
        const submitBtn = document.getElementById('submitBtn');
        const toggleAuthMode = document.getElementById('toggleAuthMode');
        const logoutBtn = document.getElementById('logoutBtn');
        const viewTitle = document.getElementById('viewTitle');

        const navDashboard = document.getElementById('navDashboard');
        const navDocEditor = document.getElementById('navDocEditor');
        const navSlideEditor = document.getElementById('navSlideEditor');

        const createDocBtn = document.getElementById('createDocBtn');
        const createSlideBtn = document.getElementById('createSlideBtn');
        
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const userDisplayName = document.getElementById('userDisplayName');
        const userAvatar = document.getElementById('userAvatar');

        let isLoginMode = true;

        // 1. ログイン・登録切り替え
        toggleAuthMode.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            document.getElementById('authSubtitle').textContent = isLoginMode ? 'ローカルワークスペースへログイン' : '新規アカウントの登録';
            submitBtn.textContent = isLoginMode ? 'ログインする' : '登録する';
            toggleAuthMode.textContent = isLoginMode ? '初めてですか？ アカウントを作成する' : '既にアカウントをお持ちですか？ ログイン';
        });

        // 2. ログイン実行
        submitBtn.addEventListener('click', () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            if (!email || !password) { alert('入力してください！'); return; }

            const userName = email.split('@')[0];
            userDisplayName.textContent = userName;
            userAvatar.textContent = userName.charAt(0).toUpperCase();

            authView.classList.remove('active');
            mainView.classList.add('active');
            showSection('dashboard');
        });

        // 3. 表示セクション切り替え関数
        function showSection(sectionName) {
            // 一旦すべて非表示
            dashboardContent.classList.remove('active');
            docEditorContent.classList.remove('active');
            slideEditorContent.classList.remove('active');
            
            navDashboard.classList.remove('active');
            navDocEditor.classList.remove('active');
            navSlideEditor.classList.remove('active');

            // 対象をアクティブに
            if (sectionName === 'dashboard') {
                dashboardContent.classList.add('active');
                navDashboard.classList.add('active');
                viewTitle.textContent = 'ダッシュボード';
            } else if (sectionName === 'doc') {
                docEditorContent.classList.add('active');
                navDocEditor.classList.add('active');
                viewTitle.textContent = 'ドキュメントエディタ';
            } else if (sectionName === 'slide') {
                slideEditorContent.classList.add('active');
                navSlideEditor.classList.add('active');
                viewTitle.textContent = 'スライドエディタ';
            }
        }

        // 4. ナビゲーションと新規作成ボタンの連動
        navDashboard.addEventListener('click', () => showSection('dashboard'));
        navDocEditor.addEventListener('click', () => showSection('doc'));
        navSlideEditor.addEventListener('click', () => showSection('slide'));

        createDocBtn.addEventListener('click', () => showSection('doc'));
        createSlideBtn.addEventListener('click', () => showSection('slide'));

        // 5. ログアウト
        logoutBtn.addEventListener('click', () => {
            mainView.classList.remove('active');
            authView.classList.add('active');
        });
    </script>
</body>
</html>
